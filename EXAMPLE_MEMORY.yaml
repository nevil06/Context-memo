project:
  name: TaskFlow API
  purpose: A REST API for team task management that allows creating, assigning, and tracking tasks across projects. Built for small teams who need simple task coordination without enterprise complexity.
  type: REST API
  stack: Node.js, Express, PostgreSQL, Prisma ORM, JWT auth, Jest
  entry_points: src/server.js, src/app.js
  environment_vars:
    - DATABASE_URL
    - JWT_SECRET
    - PORT
    - NODE_ENV
  constraints: Free tier PostgreSQL (max 10k rows), no paid APIs, must work offline
  non_goals: Real-time collaboration, file attachments, time tracking

knowledge_graph:
  god_nodes:
    - name: TaskService
      why_critical: Central business logic for all task operations. Every endpoint depends on this. Contains validation, authorization, and database access patterns used throughout.
      file: src/services/taskService.js
    - name: AuthMiddleware
      why_critical: Guards all protected routes. Used by every authenticated endpoint. Handles JWT validation and user context injection.
      file: src/middleware/auth.js

  components:
    - name: TaskController
      file: src/controllers/taskController.js
      role: HTTP request handlers for task endpoints
      exports: [createTask, getTasks, updateTask, deleteTask, assignTask]
      depends_on: [TaskService, AuthMiddleware]
      status: complete

    - name: TaskService
      file: src/services/taskService.js
      role: Business logic for task operations and validation
      exports: [create, findAll, findById, update, delete, assign]
      depends_on: [TaskRepository, UserRepository]
      status: complete

    - name: TaskRepository
      file: src/repositories/taskRepository.js
      role: Database access layer using Prisma
      exports: [create, findMany, findUnique, update, delete]
      depends_on: [PrismaClient]
      status: complete

    - name: AuthService
      file: src/services/authService.js
      role: User authentication and JWT token management
      exports: [login, register, verifyToken, hashPassword]
      depends_on: [UserRepository, bcrypt, jsonwebtoken]
      status: in_progress

    - name: UserRepository
      file: src/repositories/userRepository.js
      role: User data access
      exports: [create, findByEmail, findById]
      depends_on: [PrismaClient]
      status: complete

    - name: ValidationMiddleware
      file: src/middleware/validation.js
      role: Request body validation using Joi schemas
      exports: [validateTask, validateUser, validateQuery]
      depends_on: [joi]
      status: broken

  data_flow: Client sends JWT in Authorization header → AuthMiddleware validates → Controller receives request → Service validates business rules → Repository queries database via Prisma → Response flows back up

  api_endpoints:
    - POST /api/auth/register — Create new user account
    - POST /api/auth/login — Authenticate and get JWT token
    - GET /api/tasks — List all tasks (with filters)
    - POST /api/tasks — Create new task
    - GET /api/tasks/:id — Get single task details
    - PUT /api/tasks/:id — Update task
    - DELETE /api/tasks/:id — Delete task
    - POST /api/tasks/:id/assign — Assign task to user
    - GET /api/users/me — Get current user profile

  data_models:
    - User (id, email, password_hash, name, created_at)
    - Task (id, title, description, status, priority, assignee_id, project_id, due_date, created_at, updated_at)
    - Project (id, name, description, owner_id, created_at)

  external_services:
    - PostgreSQL database (local development, Supabase free tier for production)

