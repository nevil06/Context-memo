decisions:
  - decision: Use Prisma ORM instead of raw SQL
    why: Type safety, automatic migrations, easier to maintain. Team has Prisma experience.
    impact: All database access goes through Prisma client. Adds ~50ms query overhead but worth it for DX.

  - decision: JWT stored in Authorization header, not cookies
    why: Simpler for mobile clients and API-first design. Frontend handles storage.
    impact: Frontend must implement token refresh logic. No automatic CSRF protection.

  - decision: Soft deletes not implemented
    why: Free tier database has 10k row limit. Hard deletes save space.
    impact: Deleted tasks cannot be recovered. Must be explicit in API docs.

  - decision: No real-time updates (WebSockets)
    why: Adds complexity, not in MVP scope. Polling is acceptable for small teams.
    impact: Clients must poll for updates. Max 10 second staleness acceptable.

handoff_message: |
  This is a task management REST API built with Node.js, Express, and PostgreSQL. It's about 65% complete and currently in active development. The core CRUD operations for tasks work well, and user authentication with JWT is functional. However, there are three critical bugs that need fixing: (1) the task assignment endpoint returns 404 due to a parameter name mismatch on line 87 of taskController.js, (2) the ValidationMiddleware throws 500 errors instead of 400s, and (3) JWT tokens expire too quickly. Start by fixing the assignment bug in src/controllers/taskController.js line 87 - change req.params.taskId to req.params.id. The codebase follows a clean layered architecture (Controller → Service → Repository) with Prisma as the ORM. Don't touch the working authentication flow or the TaskService core logic. Focus on the three bugs listed above, then move on to implementing the missing project management endpoints.

