        - validateCommand
        - validate
        - executeHealthCommand
        - health
        - executeTrustCommand
        - trust
        - executeTimelineCommand
        - timeline
        - executeLocalCommand
        - local
      status: complete
    - name: coder
      file: src\agents\coder.js
      role: Generates code based on plans and context.
      exports:
        - CoderAgent
      depends_on: []
      status: complete
    - name: orchestrator
      file: src\agents\orchestrator.js
      role: Coordinates the multi-agent pipeline execution.
      exports:
        - Orchestrator
        - createOrchestrator
      depends_on:
        - PlannerAgent
        - planner
        - RetrieverAgent
        - retriever
        - CoderAgent
        - coder
        - ValidatorAgent
        - validator
