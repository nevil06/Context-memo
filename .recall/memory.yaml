decisions:
  - decision: Use Gemini 1.5 Flash API for its balance of performance and cost (free).
    why: The project aims to be accessible and free to use, making a free API a primary constraint. Gemini 1.5 Flash offers good capabilities for code analysis.
    impact: Limits the project to using Gemini and requires users to obtain an API key.
  - decision: Structure the memory file using a specific YAML format with defined sections for project, knowledge graph, and task state.
    why: This structured format is crucial for AI agents to reliably parse and understand the project context. It ensures consistency across different AI tools.
    impact: Requires strict adherence to the YAML schema by the Gemini API and the `scan.js` command.
  - decision: Implement a CLI tool for ease of use and integration into developer workflows.
    why: A CLI tool is the most direct way for developers to interact with the memory generation process without complex setup.
    impact: The primary interface is command-line based.
  - decision: Prioritize file scanning and Gemini API interaction in the `scan.js` command.
    why: This command is the core of the project, responsible for generating the memory file. Its efficiency and accuracy are paramount.
    impact: Significant development effort focused on `scan.js` and its dependencies.
handoff_message: |
  This project, `context-memo`, is a CLI tool designed to create a persistent memory layer for AI agents. Its primary goal is to solve the problem of AI agents losing project context when switching or when sessions end. It achieves this by scanning your project's codebase, configuration files, and documentation, then using the Gemini API to generate a comprehensive YAML memory file. This file includes a knowledge graph, project status, and exact continuation points, allowing any new AI agent to instantly understand the project's state.

  The project is now complete and production-ready. All 7 commands (`init`, `scan`, `load`, `status`, `update`, `install`, `config`) are fully implemented and functional. The core `scan` command correctly integrates with the Gemini API to produce the `memory.yaml` file, and the `load` command effectively generates agent briefings.

  There are currently no known bugs or missing features. The project is stable and ready for use.

  To continue development or maintenance, please refer to the `src/commands/scan.js` file for the core scanning logic and Gemini API interaction. The `src/utils/prompt.js` and `src/utils/assembler.js` files are also critical for understanding how the Gemini prompt is constructed and how agent briefings are generated, respectively. Please do not modify the core YAML structure defined in `src/utils/prompt.js` without careful consideration, as it is fundamental to agent compatibility.
