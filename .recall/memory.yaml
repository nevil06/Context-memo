decisions:
  - decision: Use Gemini 2.5 Flash Lite API for memory generation.
    why: It's a powerful, free-tier model suitable for generating structured YAML output and understanding code context, aligning with the project's goal of being cost-effective and accessible.
    impact: Enables the core functionality of the tool without requiring users to provide their own API keys or incur costs.
  - decision: Implement incremental scanning based on file hashes.
    why: To significantly reduce token usage and API call frequency on subsequent scans, making the tool more efficient and cost-effective for users over time.
    impact: Reduces the cost and time associated with using the tool for projects with frequent changes.
  - decision: Store API keys in `~/.recall/config.json`.
    why: Provides a centralized and secure location for user API keys, separate from project files, and avoids hardcoding sensitive information.
    impact: Simplifies API key management for users and enhances security.
  - decision: Use `commander` for CLI argument parsing.
    why: It's a robust and widely-used library for building command-line interfaces in Node.js, providing a structured way to define commands, options, and arguments.
    impact: Ensures a consistent and user-friendly CLI experience.
handoff_message: |
  This project, context-memo, is a CLI tool designed to provide persistent memory for AI coding agents. It scans your project, builds a knowledge graph, and uses the Gemini API to generate comprehensive briefings that agents can use to understand project context instantly. The goal is to eliminate context-switching overhead and save developers time and AI tokens.

  The project is nearly complete, with core features like scanning, memory generation, task state tracking, and agent integrations fully implemented. The main area needing attention is the `scanCommand` within `src/commands/scan.js`, specifically the `buildGeminiPrompt` function. There's a risk that the prompt construction might not always guarantee valid YAML output from Gemini, or that error handling for Gemini's responses could be more robust.

  Your immediate task is to focus on refining the `buildGeminiPrompt` function in `src/utils/prompt.js`. Ensure that all sections of the expected YAML structure are correctly populated and that the output from Gemini is consistently valid YAML. Pay close attention to error handling, especially for cases where Gemini might return an empty candidate list or malformed JSON. Do not make significant changes to other parts of the codebase unless directly related to improving the prompt generation or error handling for the Gemini API interaction.
