project:
  name: context-memo
  purpose: |
    Provides a persistent memory layer for AI coding agents by generating and managing a knowledge graph and task state. It aims to solve the problem of AI agents losing context when switching sessions or accounts.
  type: CLI
  stack:
    - Node.js
    - JavaScript
    - Commander.js
    - js-yaml
    - '@babel/parser'
    - '@babel/traverse'
    - chalk
    - clipboardy
    - inquirer
  entry_points: bin/memo.js
  environment_vars: []
  constraints: Free Gemini API key required.
knowledge_graph:
  god_nodes:
    - name: memo
      why_critical: The main CLI entry point, imports 14 dependencies and orchestrates command execution.
      file: bin\memo.js
      connections: 14
    - name: scan
      why_critical: Core scanning logic that interacts with Gemini API and builds the knowledge graph.
      file: src\commands\scan.js
      connections: 12
    - name: health
      why_critical: Implements the repository health dashboard command.
      file: src\commands\health.js
      connections: 8
    - name: timeline
      why_critical: Handles the edit replay timeline functionality.
      file: src\commands\timeline.js
      connections: 7
    - name: trust
      why_critical: Implements the AI trust meter functionality.
      file: src\commands\trust.js
      connections: 7
  components:
    - name: init
      file: src\commands\init.js
      role: Initializes the .recall/ directory and template files.
      exports:
        - initCommand
      depends_on:
        - chalk
        - inquirer
        - ensureRecallDir
        - createRecallDir
        - writeYaml
        - writeFile
        - getRecallPath
        - fileUtils
      status: complete
    - name: memo
      file: bin\memo.js
      role: The main command-line interface entry point for the context-memo tool.
      exports: []
      depends_on:
        - Command
        - commander
        - initCommand
        - init
        - scanCommand
        - scan
        - updateCommand
        - update
        - loadCommand
        - load
        - statusCommand
        - status
        - installCommand
        - install
        - configCommand
        - config
        - watchCommand
