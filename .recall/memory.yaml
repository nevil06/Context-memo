decisions:
  - decision: Use Babel AST parser for accurate code analysis instead of regex.
    why: Provides robust parsing of JavaScript and TypeScript, including modern syntax and types, ensuring accurate symbol extraction and dependency mapping.
    impact: Improved accuracy in knowledge graph generation and validation checks.
  - decision: Implement incremental scanning using file hashes.
    why: Significantly reduces token usage and scan time for subsequent scans by only processing changed files.
    impact: Cost savings and faster iteration cycles for users.
  - decision: Integrate Gemini API for high-level reasoning and context generation.
    why: Leverages AI for understanding project purpose, task state, and generating human-readable handoff messages, which are difficult to achieve with static analysis alone.
    impact: Enables intelligent context switching for AI agents.
  - decision: Separate local graph building from AI reasoning.
    why: Ensures deterministic and private analysis of code structure, while AI is used for more subjective tasks, preventing AI hallucinations in codebase representation.
    impact: Increases reliability and privacy of the memory layer.
  - decision: Implement a multi-agent pipeline (Planner, Retriever, Coder, Validator).
    why: Allows for structured and robust code generation and modification processes, with each agent specializing in a specific task.
    impact: Improves the quality and reliability of AI-generated code changes.
  - decision: Provide agent integrations for popular AI coding tools.
    why: Simplifies the adoption and usage of context-memo by allowing agents to automatically load memory upon session start.
    impact: Enhances user experience and workflow integration.
  - decision: Implement a verification-first approach for all operations.
    why: Ensures that AI-generated code and memory are validated against the actual codebase and historical data, minimizing hallucinations and errors.
    impact: Increases the trustworthiness and reliability of the AI agent's output.
handoff_message: |
  This project, context-memo, is a CLI tool designed to provide persistent memory for AI coding agents. It solves the problem of AI agents losing context between sessions or when switching agents, which wastes time and reduces productivity. The tool scans your project, builds a knowledge graph, and generates a detailed memory file (`.recall/memory.yaml`) that captures the project's structure, dependencies, task state, and progress. This memory file can then be loaded by any AI agent to instantly understand the project's context. The current version is complete and production-ready, with features including repository health monitoring, AI trust metrics, and edit replay timelines.
