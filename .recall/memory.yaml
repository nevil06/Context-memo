decisions:
  - decision: Use Babel AST parser for robust code analysis instead of regex.
    why: Provides more accurate extraction of symbols, imports, and exports, handling complex syntax.
    impact: Improved reliability and accuracy of the knowledge graph and validation steps.
  - decision: Implement incremental scanning using file hashes.
    why: Significantly reduces token usage and scan time for subsequent scans after the initial one.
    impact: Saves costs and improves developer experience by making scans faster.
  - decision: Adopt a hybrid retrieval strategy combining AST, graph, and semantic search.
    why: Leverages the strengths of each method for more comprehensive and relevant context retrieval.
    impact: Enhances the quality of information provided to AI agents.
  - decision: Integrate a multi-agent pipeline with tool-enforced repository access.
    why: Enables structured task execution and ensures AI agents interact with the codebase safely and predictably.
    impact: Improves the reliability and security of AI-driven code modifications.
  - decision: Focus on verification-first principles throughout the development lifecycle.
    why: Catches potential hallucinations and errors early through syntax, symbol, import, and path validation.
    impact: Leads to more trustworthy and reliable AI-generated code and memory.
  - decision: Use Gemini 2.5 Flash Lite API for free and efficient AI analysis.
    why: Provides a powerful language model without requiring API keys or incurring costs for users.
    impact: Makes the tool accessible to all developers without financial barriers.
handoff_message: |
  This project, context-memo, is a CLI tool designed to provide persistent memory for AI coding agents. It solves the problem of AI agents losing context when switching sessions or accounts by generating a comprehensive memory file based on project analysis.

  The tool scans project files, builds a knowledge graph, and uses the Gemini API to create detailed memory files and agent briefings. It supports features like incremental scanning to save tokens, local-first runtime for offline use, and various commands for project health, AI trust, and code timeline analysis.

  The project is now complete (v2.1.0) with all phases implemented and tested. The core functionality includes AST-based parsing, a multi-agent pipeline, tool-enforced repository access, and robust validation checks to prevent hallucinations.

  The next agent should focus on maintaining and potentially extending the existing features, ensuring all validation checks remain robust.

  Please refer to the `README.md` and `QUICKSTART.md` for an overview of commands and usage. The `DEVELOPMENT.md` file provides details for developers.

  Do not introduce any new dependencies or significantly alter the core validation or graph-building logic without thorough testing.
