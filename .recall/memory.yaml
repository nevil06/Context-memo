project:
  name: context-memo
  purpose: |
    Provides a persistent memory layer for AI coding agents by generating and managing a knowledge graph and task state. It aims to solve the problem of AI agents losing context when switching sessions or accounts.
  type: CLI
  stack:
    - Node.js
    - JavaScript
    - Commander.js
    - js-yaml
    - chalk
    - inquirer
    - clipboardy
    - '@babel/parser'
    - '@babel/traverse'
  entry_points: bin/memo.js
  environment_vars: []
  constraints: Free Gemini API key required.
knowledge_graph:
  god_nodes:
    - name: memo
      why_critical: The main CLI entry point, imports 14 dependencies and orchestrates command execution.
      file: bin\memo.js
      connections: 14
    - name: scan
      why_critical: Imports 16 dependencies, including core utilities and Gemini API interaction, central to project scanning.
      file: src\commands\scan.js
      connections: 16
    - name: test-history-grounding
      why_critical: Imports 10 dependencies, including core retrieval and validation modules, critical for testing history integration.
      file: test-history-grounding.js
      connections: 10
    - name: health
      why_critical: Imports 8 dependencies, including dashboard and formatting utilities, for repository health analysis.
      file: src\commands\health.js
      connections: 8
    - name: timeline
      why_critical: Imports 7 dependencies, including timeline formatting and editing utilities, for managing code change history.
      file: src\commands\timeline.js
      connections: 7
